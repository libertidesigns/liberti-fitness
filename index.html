/* =============================================================
   API — opraveno pro Android (obchází limit délky URL)
   Problém: Android Chrome má ~2000 char URL limit pro <script src>
   Řešení: data se posílají přes fetch POST (no-cors) a response
   se čte přes oddělený JSONP callback
   ============================================================= */
function apiWrite(type, data) {
  return new Promise(function(resolve, reject) {
    var jsonStr = JSON.stringify(data);
    var cbName = 'jcb_' + Math.random().toString(36).slice(2);
    var sc, timer;

    // Timeout
    timer = setTimeout(function() {
      cleanup(); reject(new Error('Timeout'));
    }, 30000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (sc && sc.parentNode) sc.parentNode.removeChild(sc);
    }

    window[cbName] = function(res) {
      cleanup();
      if (res && res.ok === false) reject(new Error(res.error || 'Chyba'));
      else resolve(res);
    };

    // Try fetch POST first (Android Chrome — no URL limit)
    if (window.fetch) {
      var url = API_URL + '?action=write&type=' + encodeURIComponent(type) + '&callback=' + cbName + '&t=' + Date.now();
      fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        cache: 'no-cache',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: jsonStr
      }).then(function() {
        // no-cors = opaque response, can't read body
        // Fall back to JSONP for confirmation — but data was sent via POST
        // GAS will handle POST body. We just wait for JSONP callback.
        // If GAS doesn't support POST body, do JSONP fallback:
        cleanup();
        _jsonpWrite(type, data, resolve, reject);
      }).catch(function() {
        cleanup();
        _jsonpWrite(type, data, resolve, reject);
      });
    } else {
      cleanup();
      _jsonpWrite(type, data, resolve, reject);
    }
  });
}

function _jsonpWrite(type, data, resolve, reject) {
  var cbName = 'jcb_' + Math.random().toString(36).slice(2);
  var sc, timer;
  var enc = encodeURIComponent(JSON.stringify(data));

  timer = setTimeout(function() {
    cleanup(); reject(new Error('Timeout'));
  }, 30000);

  function cleanup() {
    clearTimeout(timer);
    delete window[cbName];
    if (sc && sc.parentNode) sc.parentNode.removeChild(sc);
  }

  window[cbName] = function(res) {
    cleanup();
    if (res && res.ok === false) reject(new Error(res.error || 'Chyba'));
    else resolve(res);
  };

  sc = document.createElement('script');
  sc.src = API_URL + '?action=write&type=' + encodeURIComponent(type) + '&data=' + enc + '&callback=' + cbName + '&t=' + Date.now();
  sc.onerror = function() { cleanup(); reject(new Error('Chyba sítě')); };
  document.head.appendChild(sc);
}

function apiRead(type) {
  return new Promise(function(resolve) {
    var cbName = 'jcb_' + Math.random().toString(36).slice(2);
    var sc, timer;

    timer = setTimeout(function() {
      cleanup(); resolve([]);
    }, 22000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (sc && sc.parentNode) sc.parentNode.removeChild(sc);
    }

    window[cbName] = function(d) {
      cleanup();
      resolve(d && d.data !== undefined ? d.data : []);
    };

    sc = document.createElement('script');
    sc.src = API_URL + '?action=read&type=' + encodeURIComponent(type) + '&callback=' + cbName + '&t=' + Date.now();
    sc.onerror = function() { cleanup(); resolve([]); };
    document.head.appendChild(sc);
  });
}

/* ── Rest Timer ── */
function RestTimer({seconds,onDone}){
  const[left,setLeft]=useState(seconds);
  useEffect(()=>{if(left<=0){onDone();return;}const t=setTimeout(()=>setLeft(l=>l-1),1000);return()=>clearTimeout(t);},[left]);
  const pct=(seconds-left)/seconds;const r=38;const circ=2*Math.PI*r;
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"}}><div style={{background:C.s1,border:`1px solid ${C.mBorder}`,borderRadius:8,padding:"32px 40px",textAlign:"center",animation:"scaleIn .2s ease",minWidth:200}}><div style={{...T.m,fontSize:9,letterSpacing:"0.2em",color:C.dim,textTransform:"uppercase",marginBottom:20}}>Odpočinek</div><svg width={100} height={100} viewBox="0 0 100 100" style={{transform:"rotate(-90deg)"}}><circle cx={50} cy={50} r={r} fill="none" stroke={C.border} strokeWidth={4}/><circle cx={50} cy={50} r={r} fill="none" stroke={C.merlot} strokeWidth={4} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} style={{transition:"stroke-dashoffset .9s linear"}}/></svg><div style={{...T.t,fontSize:52,fontWeight:300,color:C.ivory,marginTop:4,lineHeight:1}}>{left}</div><div style={{...T.m,fontSize:9,color:C.dim,marginBottom:16}}>sekund</div><Btn ch="Přeskočit" onClick={onDone} v="g" sx={{fontSize:9,padding:"8px 20px"}}/></div></div>;
}

/* ── Line Chart ── */
function LineChart({data,color="#8B1A1A",H=110}){
  if(!data||data.length<2)return<div style={{...T.m,fontSize:10,color:C.dim,textAlign:"center",padding:"20px 0"}}>Potřebuješ alespoň 2 záznamy</div>;
  const W=300;const vs=data.map(d=>d.v);const mn=Math.min(...vs);const mx=Math.max(...vs);const rng=Math.max(mx-mn,0.1);
  const px=i=>(i/Math.max(data.length-1,1))*(W-24)+12;
  const py=v=>H-10-((v-mn)/rng)*(H-24);
  const pts=data.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");
  const area=`M ${px(0)},${H} ${data.map((d,i)=>`L ${px(i)},${py(d.v)}`).join(" ")} L ${px(data.length-1)},${H} Z`;
  const gid="lg"+color.replace(/[^a-z0-9]/gi,"");
  return(
    <svg viewBox={`0 0 ${W} ${H+16}`} style={{width:"100%",display:"block"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.28"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      {[0,0.5,1].map((t,i)=>{const y=H-10-t*(H-24);const v=mn+t*rng;return<g key={i}><line x1={12} y1={y} x2={W-12} y2={y} stroke={C.border} strokeWidth={0.5} strokeDasharray="3,5"/><text x={W-6} y={y+4} fill={C.dim} fontSize={7} textAnchor="end">{v.toFixed(1)}</text></g>;})}
      <path d={area} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=><circle key={i} cx={px(i)} cy={py(d.v)} r={3.5} fill={color} stroke={C.bg} strokeWidth={1.5}/>)}
      {data.map((d,i)=>{if(data.length>7&&i%2!==0&&i!==data.length-1)return null;return<text key={i} x={px(i)} y={H+14} fill={C.dim} fontSize={7} textAnchor="middle">{(d.date||"").slice(5)}</text>;})}
    </svg>
  );
}

/* ── BMI Arc ── */
function BmiArc({bmi}){
  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  const pct=cl((bmi-15)/25,0,1);const cx=70,cy=70,r=52;
  const pt=p=>{const a=Math.PI+p*Math.PI;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};};
  const arcD=(f,t)=>{const s=pt(f);const e=pt(t);const lg=t-f>0.5?1:0;return`M ${s.x} ${s.y} A ${r} ${r} 0 ${lg} 1 ${e.x} ${e.y}`;};
  const zones=[{f:0,t:0.26,c:"#4a90d0",l:"Podváha"},{f:0.26,t:0.52,c:"#3aaa5a",l:"Normální"},{f:0.52,t:0.72,c:C.amber,l:"Nadváha"},{f:0.72,t:1,c:"#e06060",l:"Obezita"}];
  const az=zones.find(z=>pct>=z.f&&pct<z.t)||zones[zones.length-1];const nd=pt(pct);
  return(
    <div style={{textAlign:"center"}}>
      <svg width={140} height={90} viewBox="0 0 140 90">
        {zones.map((z,i)=><path key={i} d={arcD(z.f,z.t)} fill="none" stroke={z.c} strokeWidth={9} opacity={0.2}/>)}
        <path d={arcD(0,pct)} fill="none" stroke={az.c} strokeWidth={9} opacity={0.85} strokeLinecap="round"/>
        <line x1={cx} y1={cy} x2={nd.x} y2={nd.y} stroke={az.c} strokeWidth={2.5} strokeLinecap="round"/>
        <circle cx={cx} cy={cy} r={5} fill={az.c}/>
        <text x={cx} y={cy-10} fill={C.ivory} fontSize={20} fontFamily="'Teko',sans-serif" fontWeight="500" textAnchor="middle">{bmi.toFixed(1)}</text>
        <text x={cx} y={cy+4} fill={az.c} fontSize={7.5} fontFamily="'Montserrat',sans-serif" textAnchor="middle" letterSpacing="0.08em">{az.l.toUpperCase()}</text>
      </svg>
    </div>
  );
}

/* ── Workout ── */
function WorkoutTab({workouts,settings,onSave}){
  const plan=PLANS.find(p=>p.id===settings.activePlan)||PLANS[0];
  const di=workouts.filter(w=>w.planId===plan.id).length%plan.days.length;
  const tDay=plan.days[di];
  const[sess,setSess]=useState(null);const[el,setEl]=useState(0);const[rt,setRt]=useState(null);const[sav,setSav]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(sess&&!ref.current)ref.current=setInterval(()=>setEl(e=>e+1),1000);if(!sess&&ref.current){clearInterval(ref.current);ref.current=null;}return()=>{if(ref.current){clearInterval(ref.current);ref.current=null;}};},[!!sess]);
  const start=(day,free=false)=>{setSess({free,dayName:free?"Volný trénink":day.name,exercises:(day.exercises||[]).map(ex=>({name:ex.name,ts:ex.sets,tr:ex.reps,rest:ex.rest||90,sets:[]})),notes:""});setEl(0);};
  const addSet=ei=>setSess(s=>{const es=[...s.exercises];const ex={...es[ei]};const last=ex.sets[ex.sets.length-1];ex.sets=[...ex.sets,{reps:last?last.reps:"",weight:last?last.weight:"",done:false}];es[ei]=ex;return{...s,exercises:es};});

            </div>

        </Box>
      ))}
      {sess.free&&<button onClick={()=>setSess(s=>({...s,exercises:[...s.exercises,{name:"Nové cvičení",ts:3,tr:"",rest:90,sets:[]}]}))} style={{background:"transparent",border:`1px dashed ${C.bHi}`,borderRadius:4,padding:"12px",width:"100%",color:C.dim,...T.m,fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",cursor:"pointer",marginBottom:14}}>+ Přidat cvičení</button>}
      <Box sx={{padding:"14px 16px",marginBottom:14}}><Inp lbl="Poznámky" val={sess.notes} onChange={v=>setSess(s=>({...s,notes:v}))} ph="Jak šel trénink?" ml rows={2}/></Box>

    </div>
  );
}

  const MEAS=[{key:"biceps",label:"Biceps",color:C.blue},{key:"chest",label:"Hrudník",color:C.purple},{key:"waist",label:"Pas",color:C.amber},{key:"hips",label:"Boky",color:"#e07840"},{key:"thighs",label:"Stehna",color:"#3aaa5a"},{key:"calves",label:"Lýtka",color:"#9a9088"}];

        <Btn ch={showF?"— Zavřít":"+ Měření"} onClick={()=>setShowF(f=>!f)} v="g" sx={{fontSize:9,padding:"8px 14px"}}/>

            <Inp lbl="% tuku (odhad)" val={form.bodyFat} onChange={v=>setForm(s=>({...s,bodyFat:v}))} ph="15" type="number"/>
            <Inp lbl="Biceps (cm)" val={form.biceps} onChange={v=>setForm(s=>({...s,biceps:v}))} ph="35" type="number"/>
            <Inp lbl="Hrudník (cm)" val={form.chest} onChange={v=>setForm(s=>({...s,chest:v}))} ph="100" type="number"/>

      {last&&(

          <Box sx={{padding:"14px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>

              const val=last[s.k]||(s.k==="height"?settings.height:"");const d=s.noD?null:diff(s.k);

        </Box>
      )}
      {first&&last&&progress.length>=2&&(
        <Box sx={{padding:"16px 14px",marginBottom:12}}>
          <Lbl c={`Srovnání · ${fmtD(first.date)} → ${fmtD(last.date)}`}/>
          {MEAS.map(m=>{const fv=parseFloat(first[m.key]);const lv=parseFloat(last[m.key]);if(!fv&&!lv)return null;const d=fv&&lv?Math.round((lv-fv)*10)/10:null;return<div key={m.key} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{...T.m,fontSize:10,color:C.hi}}>{m.label}</div><div style={{display:"flex",alignItems:"center",gap:10}}>{fv&&<div style={{...T.m,fontSize:9,color:C.dim}}>{fv} cm</div>}{lv&&<div style={{...T.m,fontSize:11,color:C.ivory,fontWeight:500}}>{lv} cm</div>}{d!==null&&<Delta val={d} unit="cm"/>}</div></div><Bar pct={fv&&lv?(lv/fv)*100:50} color={m.color} h={3}/></div>;}).filter(Boolean)}
        </Box>

      {progress.length>0&&<><SH c="Historie" sub={`${progress.length} záznamů`}/>{progress.slice(-5).reverse().map(p=><Box key={p.id||p.date} sx={{padding:"14px 16px",marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{...T.m,fontSize:11,color:C.hi}}>{fmtD(p.date)}</div><div style={{display:"flex",gap:14,alignItems:"baseline"}}>{p.weight&&<div style={{...T.t,fontSize:22,color:C.ivory,lineHeight:1}}>{p.weight}<span style={{fontSize:11,color:C.dim}}> kg</span></div>}{p.bodyFat&&<div style={{...T.m,fontSize:10,color:"#e06060"}}>{p.bodyFat}%</div>}</div></div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["biceps","Bi",C.blue],["chest","Hr",C.purple],["waist","Pa",C.amber],["thighs","St","#e07840"],["calves","Ly","#9a9088"]].map(([k,sh,col])=>{if(!p[k])return null;return<div key={k} style={{...T.m,fontSize:9,color:C.dim,background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"3px 8px"}}><span style={{color:col}}>{sh}</span> {p[k]}cm</div>;})}</div>{p.notes&&<div style={{...T.m,fontSize:10,color:C.dim,marginTop:8,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:6}}>{p.notes}</div>}</Box>)}</>}
      {progress.length===0&&<Box sx={{padding:"32px 24px",textAlign:"center",border:`1px dashed ${C.border}`}}><div style={{...T.t,fontSize:22,color:C.dim,marginBottom:8}}>Žádná měření</div><div style={{...T.m,fontSize:11,color:C.dim,lineHeight:1.6}}>Přidej první měření tlačítkem nahoře.</div></Box>}
    </div>

/* ── Meal Planner ── */
function MealPlannerTab({mealPlan,settings,onSave}){
  const[view,setView]=useState("week");const[wOff,setWOff]=useState(0);const[editSlot,setEditSlot]=useState(null);const[sav,setSav]=useState(false);
  const goalCal=parseInt(settings.calGoal)||2800;
  const getWeekDates=useCallback(off=>{const d=new Date();const day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1)+off*7);d.setHours(0,0,0,0);return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x.toISOString().slice(0,10);});},[]);
  const weekDates=useMemo(()=>getWeekDates(wOff),[wOff]);
  const getSlot=(date,slot)=>(mealPlan[date]||{})[slot]||null;
  const setSlot=async(date,slot,meal)=>{setSav(true);await onSave({...mealPlan,[date]:{...(mealPlan[date]||{}),[slot]:meal}});setSav(false);};
  const gen=async(force=false)=>{setSav(true);const upd={...mealPlan};weekDates.forEach(date=>{if(!upd[date])upd[date]={};SLOTS.forEach(slot=>{if(force||!upd[date][slot]){const pool=MDB[slot]||[];upd[date][slot]=pool[Math.floor(Math.random()*pool.length)];}});});await onSave(upd);setSav(false);};
  const dayMac=date=>{const d=mealPlan[date]||{};return SLOTS.reduce((a,s)=>{const m=d[s];if(!m)return a;return{cal:a.cal+(m.cal||0),p:a.p+(m.p||0),s:a.s+(m.s||0),t:a.t+(m.t||0)};},{cal:0,p:0,s:0,t:0});};
  const monthDates=useMemo(()=>{const now=new Date();const y=now.getFullYear();const mo=now.getMonth();return Array.from({length:new Date(y,mo+1,0).getDate()},(_,i)=>new Date(y,mo,i+1).toISOString().slice(0,10));},[]);

  if(editSlot){
    const pool=MDB[editSlot.slot]||[];const cur=getSlot(editSlot.date,editSlot.slot);
    return(
      <div style={{padding:"20px 20px 110px",animation:"fadeIn .25s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
          <button onClick={()=>setEditSlot(null)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"7px 14px",color:C.hi,...T.m,fontSize:9,letterSpacing:"0.1em",cursor:"pointer",textTransform:"uppercase"}}>← Zpět</button>
          <div><div style={{...T.t,fontSize:18,color:C.ivory,letterSpacing:"0.1em",textTransform:"uppercase"}}>{SLOT_L[editSlot.slot]}</div><div style={{...T.m,fontSize:9,color:C.dim}}>{fmtD(editSlot.date)}</div></div>
        </div>
        <SH c="Vyber jídlo"/>
        {cur&&<Box sx={{padding:"10px 14px",marginBottom:14,border:`1px solid ${C.mBorder}`,background:C.mDark}}><div style={{...T.m,fontSize:9,color:C.merlot,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>Aktuálně</div><div style={{...T.m,fontSize:12,color:C.ivory}}>{cur.name}</div></Box>}
        {pool.map((meal,i)=>{const isSel=cur&&cur.name===meal.name;return(
          <div key={i} onClick={async()=>{await setSlot(editSlot.date,editSlot.slot,meal);setEditSlot(null);}} style={{background:C.s1,border:`1px solid ${isSel?SLOT_C[editSlot.slot]:C.border}`,borderRadius:4,padding:"14px 16px",marginBottom:10,cursor:"pointer",transition:"border-color .15s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}><div style={{...T.m,fontSize:13,color:C.ivory,marginBottom:4,fontWeight:isSel?500:400}}>{meal.name}</div><div style={{...T.m,fontSize:9,color:C.dim}}>Příprava: {meal.time}</div></div>
              <div style={{textAlign:"right",flexShrink:0,paddingLeft:12}}><div style={{...T.t,fontSize:20,color:SLOT_C[editSlot.slot],lineHeight:1}}>{meal.cal}<span style={{fontSize:10}}> kcal</span></div><div style={{...T.m,fontSize:8,color:C.dim,marginTop:3}}>B:{meal.p}g S:{meal.s}g T:{meal.t}g</div></div>
            </div>
          </div>
        );})}
      </div>
    );
  }

  return(
    <div style={{padding:"20px 20px 110px",animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{...T.t,fontSize:24,fontWeight:600,letterSpacing:"0.16em",color:C.ivory,textTransform:"uppercase"}}>Jídelní plán</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {sav&&<Spin sz={13}/>}
          <button onClick={()=>setView(v=>v==="week"?"month":"week")} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"6px 11px",color:C.dim,...T.m,fontSize:8,letterSpacing:"0.1em",cursor:"pointer",textTransform:"uppercase"}}>{view==="week"?"Měsíc":"Týden"}</button>
        </div>
      </div>
      <div style={{background:C.s1,border:`1px solid ${C.blue}33`,borderLeft:`3px solid ${C.blue}`,borderRadius:4,padding:"12px 16px",marginBottom:14}}>
        <div style={{...T.m,fontSize:9,color:C.blue,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Doporučení pro nabírání svalů</div>
        <div style={{...T.m,fontSize:11,color:C.hi,lineHeight:1.7}}>Cíl: <strong style={{color:C.ivory}}>{goalCal} kcal</strong> · bílkoviny min. <strong style={{color:C.ivory}}>{Math.round((parseFloat(settings.startWeight)||80)*2)} g/den</strong> · kalorický přebytek ~300 kcal · 4–5 jídel denně</div>
      </div>
      {view==="week"&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={()=>setWOff(o=>o-1)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"6px 14px",color:C.hi,...T.m,fontSize:13,cursor:"pointer"}}>←</button>
            <div style={{textAlign:"center"}}><div style={{...T.m,fontSize:10,color:C.ivory}}>{weekDates[0].slice(5).replace("-",".")}–{weekDates[6].slice(5).replace("-",".")}</div>{wOff===0&&<div style={{...T.m,fontSize:8,color:C.merlot,marginTop:2,letterSpacing:"0.1em"}}>tento týden</div>}</div>
            <button onClick={()=>setWOff(o=>o+1)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"6px 14px",color:C.hi,...T.m,fontSize:13,cursor:"pointer"}}>→</button>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <Btn ch={sav?"...":"Doplnit prázdné"} onClick={()=>gen(false)} v="g" sx={{flex:1,fontSize:9,padding:"9px"}} dis={sav}/>
            <Btn ch={sav?"...":"Vygenerovat znovu"} onClick={()=>gen(true)} v="g" sx={{flex:1,fontSize:9,padding:"9px"}} dis={sav}/>
          </div>
          {weekDates.map((date,dayIdx)=>{
            const mac=dayMac(date);const calPct=goalCal>0?(mac.cal/goalCal)*100:0;const isToday=date===today;
            return(
              <Box key={date} sx={{marginBottom:12,border:`1px solid ${isToday?C.mBorder:C.border}`,transition:"border-color .2s"}}>
                <div style={{padding:"12px 16px 8px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{...T.t,fontSize:18,fontWeight:500,color:isToday?C.merlot:C.ivory,letterSpacing:"0.1em",textTransform:"uppercase"}}>{DAYS_FULL[dayIdx]}</div>
                    {isToday&&<div style={{...T.m,fontSize:8,color:C.merlot,background:C.mDark,border:`1px solid ${C.mBorder}`,borderRadius:2,padding:"2px 7px",letterSpacing:"0.1em",textTransform:"uppercase"}}>Dnes</div>}
                  </div>
                  {mac.cal>0&&<div style={{...T.t,fontSize:18,color:calPct>=90?C.green:C.hi}}>{mac.cal}<span style={{...T.m,fontSize:9,color:C.dim}}> kcal</span></div>}
                </div>
                {mac.cal>0&&<div style={{padding:"0 16px"}}><Bar pct={calPct} color={calPct>=100?C.green:C.merlot} h={2}/></div>}
                <div style={{padding:"8px 16px 12px"}}>
                  {SLOTS.map(slot=>{const meal=getSlot(date,slot);return(
                    <div key={slot} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setEditSlot({date,slot})}>
                      <div style={{width:3,height:32,background:SLOT_C[slot],borderRadius:2,flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}><div style={{...T.m,fontSize:8,color:SLOT_C[slot],letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>{SLOT_L[slot]}</div>{meal?<div style={{...T.m,fontSize:11,color:C.hi,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{meal.name}</div>:<div style={{...T.m,fontSize:10,color:C.dim,fontStyle:"italic"}}>Klikni pro výběr</div>}</div>
                      {meal&&<div style={{textAlign:"right",flexShrink:0}}><div style={{...T.t,fontSize:16,color:SLOT_C[slot],lineHeight:1}}>{meal.cal}</div><div style={{...T.m,fontSize:7.5,color:C.dim}}>kcal</div></div>}
                      <div style={{color:C.dim,fontSize:12,flexShrink:0}}>›</div>
                    </div>
                  );})}
                  {mac.cal>0&&<div style={{display:"flex",gap:14,marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>{[{l:"Bílkoviny",v:mac.p,c:C.blue},{l:"Sacharidy",v:mac.s,c:C.amber},{l:"Tuky",v:mac.t,c:"#e07840"}].map(m=><div key={m.l} style={{flex:1,textAlign:"center"}}><div style={{...T.t,fontSize:17,color:m.c,lineHeight:1}}>{m.v}<span style={{fontSize:9}}>g</span></div><div style={{...T.m,fontSize:7.5,color:C.dim,letterSpacing:"0.06em",textTransform:"uppercase",marginTop:2}}>{m.l}</div></div>)}</div>}
                </div>
              </Box>
            );
          })}
        </>
      )}
      {view==="month"&&(
        <>
          <SH c={new Date().toLocaleString("cs",{month:"long",year:"numeric"})}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:8}}>{DAYS_S.map(d=><div key={d} style={{...T.m,fontSize:8,color:C.dim,textAlign:"center",letterSpacing:"0.08em"}}>{d}</div>)}</div>
          {(()=>{const fd=new Date(monthDates[0]).getDay();const off=fd===0?6:fd-1;const cells=[...Array(off).fill(null),...monthDates];const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));return weeks.map((week,wi)=><div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>{week.map((date,di)=>{if(!date)return<div key={di}/>;const mac=dayMac(date);const hasD=mac.cal>0;const isT=date===today;const dn=parseInt(date.slice(8));return<div key={di} style={{background:isT?C.mDark:hasD?C.s2:C.s1,border:`1px solid ${isT?C.merlot:C.border}`,borderRadius:3,padding:"5px 4px",textAlign:"center",minHeight:48}}><div style={{...T.m,fontSize:10,color:isT?C.merlot:C.dim,marginBottom:2}}>{dn}</div>{hasD&&<><div style={{...T.t,fontSize:11,color:C.ivory,lineHeight:1}}>{mac.cal}</div><div style={{...T.m,fontSize:6.5,color:C.dim}}>kcal</div></>}</div>;})} </div>);})()}
        </>
      )}
    </div>
  );
}

/* ── Settings ── */
function SettingsTab({settings,onSave,onInstall,isInstalled}){
  const[form,setForm]=useState({...DEF_S,...settings});const[sav,setSav]=useState(false);const[ok,setOk]=useState(false);
  const save=async()=>{setSav(true);await onSave(form);setSav(false);setOk(true);setTimeout(()=>setOk(false),2200);};
  return(
    <div style={{padding:"24px 20px 110px",animation:"fadeIn .3s ease"}}>
      <SH c="Nastavení"/>
      {!isInstalled&&(
        <Box sx={{padding:"16px 18px",marginBottom:14,border:`1px solid ${C.green}44`}}>
          <div style={{...T.m,fontSize:9,color:C.green,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Nainstalovat jako app</div>
          <div style={{...T.m,fontSize:11,color:C.hi,lineHeight:1.6,marginBottom:12}}>Přidej LIBERTI Fitness na plochu — bez prohlížeče, funguje offline.</div>
          {onInstall?<Btn ch="Nainstalovat na plochu" onClick={onInstall} v="gr" sx={{width:"100%"}}/>:<div style={{...T.m,fontSize:10,color:C.hi,lineHeight:1.8}}><strong style={{color:C.ivory}}>iPhone:</strong> Safari → Sdílet → Přidat na plochu<br/><strong style={{color:C.ivory}}>Android:</strong> Chrome → Menu (⋮) → Přidat na plochu</div>}
        </Box>
      )}
      {isInstalled&&<Box sx={{padding:"12px 16px",marginBottom:14,border:`1px solid ${C.green}44`}}><div style={{...T.m,fontSize:9,color:C.green,letterSpacing:"0.12em",textTransform:"uppercase"}}>Aplikace nainstalována</div></Box>}
      <Box sx={{padding:"20px",marginBottom:14}}>
        <Lbl c="Profil"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{gridColumn:"1/-1"}}><Inp lbl="Jméno" val={form.name} onChange={v=>setForm(s=>({...s,name:v}))} ph="Tvoje jméno"/></div>
          <Inp lbl="Výška (cm)" val={form.height} onChange={v=>setForm(s=>({...s,height:v}))} ph="180" type="number"/>
          <Inp lbl="Denní kalorie (kcal)" val={form.calGoal} onChange={v=>setForm(s=>({...s,calGoal:v}))} ph="2800" type="number"/>
          <Inp lbl="Startovní váha (kg)" val={form.startWeight} onChange={v=>setForm(s=>({...s,startWeight:v}))} ph="80" type="number"/>
          <Inp lbl="Cílová váha (kg)" val={form.goalWeight} onChange={v=>setForm(s=>({...s,goalWeight:v}))} ph="85" type="number"/>
        </div>
        <Btn ch={sav?"Ukládám...":(ok?"✓ Uloženo":"Uložit nastavení")} onClick={save} dis={sav} sx={{width:"100%",marginTop:14,background:ok?C.green:undefined}}/>
      </Box>
      <Box sx={{padding:"16px 18px",marginBottom:14}}><Lbl c="Aktivní tréninkový plán"/><Inp lbl="" val={form.activePlan} onChange={v=>setForm(s=>({...s,activePlan:v}))} opts={PLANS.map(p=>({v:p.id,l:`${p.name} — ${p.desc}`}))}/></Box>
      <Box sx={{padding:"16px 18px"}}><Lbl c="Účet"/><Btn ch="Odhlásit se" onClick={()=>{localStorage.removeItem("lf_auth");window.location.reload();}} v="d"/></Box>
    </div>
  );
}

/* ── Bottom Nav ── */
function BottomNav({active,onSelect}){
  const tabs=[{id:"home",l:"Dnes",ic:"⌂"},{id:"workout",l:"Trénink",ic:"◈"},{id:"plans",l:"Plány",ic:"≡"},{id:"progress",l:"Pokrok",ic:"↗"},{id:"meal",l:"Jídelní plán",ic:"◉"}];
  return(
    <nav style={{position:"fixed",bottom:0,left:0,right:0,background:C.s1,borderTop:`1px solid ${C.border}`,zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
      <div style={{display:"flex"}}>
        {tabs.map(t=>{const isA=active===t.id;return(
          <button key={t.id} onClick={()=>onSelect(t.id)} style={{flex:1,padding:"9px 2px 7px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,touchAction:"manipulation",WebkitTapHighlightColor:"transparent",position:"relative"}}>
            {isA&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:18,height:2,background:C.merlot,borderRadius:1}}/>}
            <span style={{fontSize:16,color:isA?C.merlot:C.dim,transition:"color .15s"}}>{t.ic}</span>
            <span style={{...T.m,fontSize:6.5,letterSpacing:"0.05em",textTransform:"uppercase",color:isA?C.merlot:C.dim,fontWeight:isA?600:400,transition:"color .15s",lineHeight:1.2,textAlign:"center"}}>{t.l}</span>
          </button>
        );})}
      </div>
    </nav>
  );
}

/* ── App ── */
function App(){
  const[authed,setAuthed]=useState(false);const[tab,setTab]=useState("home");const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);const[syncErr,setSyncErr]=useState(null);const[toast,setToast]=useState(null);
  const[workouts,setWorkouts]=useState([]);const[progress,setProgress]=useState([]);const[mealPlan,setMealPlan]=useState({});const[settings,setSettings]=useState(DEF_S);
  const[installFn,setInstallFn]=useState(null);const[installed,setInstalled]=useState(false);
  const{confirm,Modal}=useConfirm();
  useEffect(()=>{
    setInstalled(window.matchMedia('(display-mode: standalone)').matches||!!window.navigator.standalone);
    const h=e=>{e.preventDefault();setInstallFn(()=>async()=>{try{e.prompt();await e.userChoice;}catch(x){}setInstallFn(null);});};
    window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);
  const t2=(msg,ms=2600)=>{setToast(msg);setTimeout(()=>setToast(null),ms);};
  const loadAll=async()=>{
    setLoading(true);setSyncErr(null);
    try{
      const w=await apiRead("workouts");const pr=await apiRead("progress");const mp=await apiRead("mealplan");const s=await apiRead("settings");
      setWorkouts(Array.isArray(w)?w:[]);setProgress(Array.isArray(pr)?pr:[]);
      if(mp&&typeof mp==="object"&&!Array.isArray(mp))setMealPlan(mp);else setMealPlan({});
      if(s&&typeof s==="object"&&!Array.isArray(s)&&s.name)setSettings({...DEF_S,...s});
    }catch(e){setSyncErr("Chyba načítání");}
    setLoading(false);
  };
  useEffect(()=>{if(authed)loadAll();},[authed]);
  const saveW=async d=>{setSyncing(true);try{await apiWrite("workouts",d);setWorkouts(d);t2("✓ Trénink uložen");}catch(e){t2("⚠ Chyba ukládání");}setSyncing(false);};
  const savePr=async d=>{setSyncing(true);try{await apiWrite("progress",d);setProgress(d);t2("✓ Měření uloženo");}catch(e){t2("⚠ Chyba ukládání");}setSyncing(false);};
  const saveMp=async d=>{setSyncing(true);try{await apiWrite("mealplan",d);setMealPlan(d);}catch(e){t2("⚠ Chyba ukládání");}setSyncing(false);};
  const saveSt=async d=>{setSyncing(true);try{await apiWrite("settings",d);setSettings(d);t2("✓ Nastavení uloženo");}catch(e){t2("⚠ Chyba ukládání");}setSyncing(false);};
  const actPlan=async id=>{const ns={...settings,activePlan:id};await saveSt(ns);t2("✓ Plán aktivován");};
  if(!authed)return <PinLogin onSuccess={()=>setAuthed(true)}/>;
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {Modal}
      <header style={{borderBottom:`1px solid ${C.border}`,padding:"0 20px",height:50,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:C.bg,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center"}}>
          <div style={{...T.t,fontWeight:300,fontSize:22,letterSpacing:"0.26em",color:C.ivory,textIndent:"0.26em"}}>LIBERTI</div>
          <div style={{borderLeft:`1px solid ${C.border}`,marginLeft:14,paddingLeft:14}}><div style={{...T.m,fontSize:7.5,letterSpacing:"0.36em",textTransform:"uppercase",color:C.merlot}}>FITNESS</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {syncing&&<Spin sz={13}/>}
          {toast&&!syncing&&<span style={{...T.m,fontSize:9,letterSpacing:"0.1em",color:toast.startsWith("⚠")?"#e06060":C.green,animation:"fadeIn .2s ease"}}>{toast}</span>}
          {syncErr&&<span style={{...T.m,fontSize:9,color:"#e06060",cursor:"pointer"}} onClick={loadAll}>{syncErr} ↺</span>}
          <button onClick={loadAll} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"5px 10px",color:C.dim,...T.m,fontSize:8.5,letterSpacing:"0.1em",cursor:"pointer",textTransform:"uppercase"}}>Sync</button>
          <button onClick={()=>setTab("settings")} style={{background:tab==="settings"?C.s2:"transparent",border:`1px solid ${tab==="settings"?C.merlot:C.border}`,borderRadius:3,padding:"5px 10px",color:tab==="settings"?C.ivory:C.dim,...T.m,fontSize:8.5,cursor:"pointer",textTransform:"uppercase"}}>⚙</button>
        </div>
      </header>
      {loading?<div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"65vh"}}><div style={{textAlign:"center"}}><Spin sz={32}/><div style={{...T.m,fontSize:10,color:C.dim,marginTop:18,letterSpacing:"0.14em",textTransform:"uppercase"}}>Načítám data...</div></div></div>:(
        <div>
          {tab==="home"&&<HomeTab workouts={workouts} progress={progress} settings={settings} onGoTo={setTab}/>}
          {tab==="workout"&&<WorkoutTab workouts={workouts} settings={settings} onSave={saveW}/>}
          {tab==="plans"&&<PlansTab settings={settings} onActivate={actPlan}/>}
          {tab==="progress"&&<ProgressTab progress={progress} settings={settings} onSave={savePr}/>}
          {tab==="meal"&&<MealPlannerTab mealPlan={mealPlan} settings={settings} onSave={saveMp}/>}
          {tab==="settings"&&<SettingsTab settings={settings} onSave={saveSt} onInstall={installFn} isInstalled={installed}/>}
        </div>
      )}
      {tab!=="settings"&&<BottomNav active={tab} onSelect={setTab}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
